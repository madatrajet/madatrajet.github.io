<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mada Trajet</title>
  <link rel="icon" type="png" href="image.png">

<style>

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0f172a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HAUT BLEU */
.top{
  padding:30px 20px;
  text-align:center;
}

.top h1{
  color:white;
  margin:0;
  font-size:38px;
}

.top p{
  color:#dbeafe;
  margin-top:10px;
}

/* PARTIE BLANCHE */
.main{
  background:white;
  border-radius:30px 30px 0 0;
  flex:1;
  padding:40px 20px;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* CARD */
.card{
  background:#f8fafc;
  padding:20px;
  border-radius:20px;
  width:100%;
  max-width:420px;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
}

/* FORM */
#form1{
  display:flex;
  flex-direction:column;
  gap:12px;
}

#form1 label{
  display:flex;
  align-items:center;
  gap:12px;
  padding:14px 12px;
  border-radius:14px;
  background:white;
  border:1px solid #ddd;
  cursor:pointer;
  transition:0.2s;
}

#form1 label:hover{
  background:#f1f5f9;
  transform:scale(1.01);
}

#form1 input[type="radio"]{
  transform:scale(1.2);
}

/* BUTTON */
button{
  width:100%;
  padding:15px;
  background:#0f172a;
  color:white;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-size:16px;
  transition:0.2s;
}

button:hover{
  background:#1e293b;
  transform:scale(1.02);
}

/* BAS BLEU */
.footer{
  text-align:center;
  padding:18px;
  color:white;
  background:#0f172a;
}

</style>

</head>

<body>

<!-- HAUT -->
<div class="top">
  <h1>Mada Trajet 🚍</h1>

  <p>
    Veuillez choisir votre province de destination
  </p>
</div>

<!-- MILIEU BLANC -->
<div class="main">

  <form id="form1" class="card">

    <label>
      <input type="radio" name="province" value="Toamasina">
      Toamasina
    </label>

    <label>
      <input type="radio" name="province" value="Mahajanga">
      Mahajanga
    </label>

    <label>
      <input type="radio" name="province" value="Antsiranana">
      Antsiranana
    </label>

    <label>
      <input type="radio" name="province" value="Antananarivo">
      Antananarivo
    </label>

    <label>
      <input type="radio" name="province" value="Fianarantsoa">
      Fianarantsoa
    </label>

    <label>
      <input type="radio" name="province" value="Toliara">
      Toliara
    </label>

    <button>Continuer</button>

  </form>

</div>

<!-- BAS -->
<div class="footer">
  © 2026 Mada Trajet
</div>

<script>

document.getElementById("form1").addEventListener("submit", function(e){

e.preventDefault();

const selected = document.querySelector('input[name="province"]:checked');

if(!selected){
alert("Choisis une province 😭");
return;
}

localStorage.setItem("region", selected.value);

window.location.href="index3.html";

});

</script>

</body>
</html>
