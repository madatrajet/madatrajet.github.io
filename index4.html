<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Résultats</title>
  <link rel="icon" type="png" href="image.png">

<style>

.btn-retour{
  display:inline-block;
  padding:10px 18px;
  background:#030507;
  color:white;
  text-decoration:none;
  border-radius:8px;
  font-weight:bold;
  margin:20px;
}

body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background:#0f172a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

.top{
  padding:30px 20px;
  text-align:center;
}

.top h2{
  color:white;
  margin:0;
  font-size:32px;
}

.top p{
  color:#dbeafe;
  margin-top:10px;
}

.main{
  background:white;
  border-radius:30px 30px 0 0;
  flex:1;
  padding:40px 20px;
}

.container{
  max-width:800px;
  margin:auto;
}

#resultat{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:#f8fafc;
  border:1px solid #ddd;
  border-radius:20px;
  padding:20px;
  box-shadow:0 8px 20px rgba(0,0,0,0.05);
}

.card h3{
  margin-top:0;
}

.footer{
  text-align:center;
  padding:18px;
  color:white;
  background:#0f172a;
}

</style>
</head>

<body>

<div class="top">
  <h2 id="title"></h2>

  <p>
    Voici les coopératives disponibles
  </p>
</div>

<div class="main">

  <div class="container">

    <div id="resultat"></div>

  </div>

</div>

<div class="footer">
  © 2026 Mada Trajet
</div>

<script src="data.js"></script>

<script>

/* NORMALIZE */
function normalize(s){
  return (s || "")
    .trim()
    .toLowerCase()
    .replace(/\s+/g," ");
}

/* STORAGE */
const villeRaw = localStorage.getItem("ville") || "";
const gareChoisie = localStorage.getItem("gare") || "";

/* NORMALIZED */
const ville = normalize(villeRaw);

/* TITRE */
document.getElementById("title").innerText =
`Antananarivo → ${villeRaw}`;

/* FILTRE */
const resultats = busData.filter(bus => {

  const trajetOK =
    normalize(bus.depart) === "antananarivo"
    &&
    normalize(bus.arrivee) === ville;

  /* SI PAS DE GARE CHOISIE */
  if(!gareChoisie || gareChoisie === "autres"){
    return trajetOK;
  }

  /* FILTRE GARE */
  let gareTexte = "";

  if(gareChoisie === "ampasapito"){
    gareTexte = "Gare Routière Ampasapito";
  }

  else if(gareChoisie === "fasannykarana"){
    gareTexte = "Fasan'ny Karana";
  }

  else if(gareChoisie === "maki"){
    gareTexte = "Gare MAKI Andohatapenaka";
  }

  return trajetOK && bus.gare === gareTexte;

});

/* UPDATE TITLE */
document.getElementById("title").innerText =
`Antananarivo → ${villeRaw}
(${resultats.length} trajets trouvés)`;

/* DIV */
const div = document.getElementById("resultat");

/* NO RESULT */
if(resultats.length === 0){

  div.innerHTML = `
  <div class="card">
    <h3>Aucun trajet 😭</h3>

    <p>
      Aucun résultat trouvé pour cette destination.
    </p>
  </div>
  `;

}

/* RESULTATS */
else{

  resultats.forEach(bus => {

    div.innerHTML += `
    <div class="card">

      <h3>🚍 ${bus.coop}</h3>

      <p>
        📍 ${bus.depart} → ${bus.arrivee}
      </p>

      <p>
        🏢 ${bus.gare || "Gare inconnue"}
      </p>

      <p>
        💰 ${bus.prix || "Non défini"}
      </p>

      <p>
        ⏰ ${bus.heureDepart || "Non défini"}
      </p>

      <p>
        ${
          bus.numero.length > 0
          ?
          bus.numero.map(n => `
            <a href="tel:${n.replace(/ /g,'')}">
              📞 ${n}
            </a>
          `).join("<br>")
          :
          "Numéro indisponible"
        }
      </p>

    </div>
    `;

  });

}

</script>

<a href="index.html" class="btn-retour">
⬅ Retour
</a>

</body>
</html>
