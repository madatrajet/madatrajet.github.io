<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recherche avancée - Mada Trajet</title>

<style>

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:#0f172a;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

/* HAUT */
.top{
  padding:30px 20px;
  text-align:center;
}

.top h2{
  color:white;
  margin:0;
  font-size:32px;
}

.top p{
  color:#dbeafe;
  margin-top:10px;
}

/* MILIEU BLANC */
.main{
  background:white;
  border-radius:30px 30px 0 0;
  flex:1;
  padding:40px 20px;
  display:flex;
  justify-content:center;
}

.card{
  width:100%;
  max-width:700px;
}

/* GARES */
#gares{
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* LABEL */
.gare-card{
  display:block;
  border-radius:22px;
  overflow:hidden;
  cursor:pointer;
  background:#f8fafc;
  box-shadow:0 8px 25px rgba(0,0,0,0.08);
  transition:0.25s;
}

.gare-card:hover{
  transform:scale(1.02);
}

/* CACHE RADIO */
.gare-card input{
  display:none;
}

/* IMAGE */
.gare-image{
  position:relative;
  height:240px;
  overflow:hidden;
}

.gare-image img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* NOIRCISSEMENT */
.gare-image::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.1),
    rgba(0,0,0,0.55)
  );
}

/* BAS */
.gare-name{
  height:80px;
  background:white;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:20px;
  font-weight:bold;
  color:#0f172a;
}

/* SELECTION */
.gare-card input:checked + .gare-image{
  outline:4px solid #2563eb;
}

button{
  width:100%;
  padding:16px;
  margin-top:25px;
  background:#0f172a;
  color:white;
  border:none;
  border-radius:14px;
  font-size:16px;
  cursor:pointer;
  transition:0.2s;
}

button:hover{
  background:#1e293b;
}

/* BAS BLEU */
.footer{
  text-align:center;
  padding:18px;
  color:white;
  background:#0f172a;
}

</style>
</head>

<body>

<!-- HAUT -->
<div class="top">

  <h2>Recherche avancée</h2>

  <p>
    Choisissez une gare pour filtrer les trajets
  </p>

</div>

<!-- MILIEU -->
<div class="main">

  <form id="gareForm" class="card">

    <div id="gares">

      <!-- AMPASAPITO -->
      <label class="gare-card">

        <input type="radio" name="gare" value="ampasapito">

        <div class="gare-image">
          <img src="gare1.jpg">
        </div>

        <div class="gare-name">
          Gare Routière Ampasapito
        </div>

      </label>

      <!-- FASAN'NY KARANA -->
      <label class="gare-card">

        <input type="radio" name="gare" value="fasannykarana">

        <div class="gare-image">
          <img src="gare2.jpg">
        </div>

        <div class="gare-name">
          Gare Fasan'ny Karana
        </div>

      </label>

      <!-- GARE MAKI -->
      <label class="gare-card">

        <input type="radio" name="gare" value="maki">

        <div class="gare-image">
          <img src="gare4.jpg">
        </div>

  <div class="gare-name">
    Gare MAKI Andohatapenaka
  </div>

</label>

      <!-- AUTRES -->
      <label class="gare-card">

        <input type="radio" name="gare" value="autres">

        <div class="gare-image">
          <img src="gare3.jpg">
        </div>

        <div class="gare-name">
          Autres trajets
        </div>

      </label>

    </div>

  </form>

</div>

<!-- BAS -->
<div class="footer">
  © 2026 Mada Trajet
</div>

<script>

const cards = document.querySelectorAll('.gare-card');

cards.forEach(card => {

card.addEventListener("click", function(){

const radio = this.querySelector("input");

radio.checked = true;

localStorage.setItem("gare", radio.value);

window.location.href = "index4.html";

});

});

</script>

</body>
</html>
